# Production stack for the Predict Mini App, deployed alongside (but isolated
# from) the live cashback app on the same VPS. Joins the existing Traefik network
# so the shared Traefik can route market.kopix.online / api.market.kopix.online.
#
# Deploy: see docs/deploy.md
name: kopix-predict

services:
  db:
    image: postgres:16-alpine
    container_name: predict-postgres
    environment:
      POSTGRES_USER: predict
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: predict
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predict -d predict"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  predict-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: predict-api
    environment:
      DATABASE_URL: postgres://predict:${POSTGRES_PASSWORD}@db:5432/predict?sslmode=disable
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      WEB_ORIGIN: https://market.kopix.online
      PORT: "8000"
      ALLOW_INSECURE_INITDATA: ${ALLOW_INSECURE_INITDATA:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - web
    restart: unless-stopped

  predict-web:
    build:
      context: ./web
      args:
        VITE_API_BASE: https://api.market.kopix.online
    container_name: predict-web
    networks:
      - web
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  web:
    external: true
    name: kopix-cashback_kopix

volumes:
  pgdata:
