    <title>KopiX Predict</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="prefetch" href="/lottie/onb-connect.json" />
    <link rel="prefetch" href="/lottie/onb-start.json" />

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
