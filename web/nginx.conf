server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Hashed build assets — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must never be cached (Telegram WKWebView workaround) + CSP.
    location = /index.html {
        add_header Cache-Control "no-store";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; img-src 'self' https: data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://api.market.kopix.online; frame-ancestors 'none'; base-uri 'self'; form-action 'none';" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
