server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers (review-4 P1). Telegram Mini App: разрешаем telegram.org SDK
  # + наш API. Продублированы в = /index.html (свой add_header сбрасывает
  # унаследованные server-level — особенность nginx).
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; img-src 'self' https: data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://api.market.kopix.online https://bridge.tonapi.io https://*.tonapi.io https://raw.githubusercontent.com https://walletbot.me https://tonconnectbridge.mytonwallet.org https://connect.tonhubapi.com; frame-ancestors 'none'; base-uri 'self'; form-action 'none';" always;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long cache for assets, no cache for index.html
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    # no-store (не no-cache): Telegram WKWebView иногда не ревалидирует no-cache
    # и отдаёт устаревший index.html → старые хеши ассетов → фиксы не доезжают.
    add_header Cache-Control "no-store";
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; img-src 'self' https: data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://api.market.kopix.online https://bridge.tonapi.io https://*.tonapi.io https://raw.githubusercontent.com https://walletbot.me https://tonconnectbridge.mytonwallet.org https://connect.tonhubapi.com; frame-ancestors 'none'; base-uri 'self'; form-action 'none';" always;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;
}
