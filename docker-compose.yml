services:
  postgres:
    image: postgres:16-alpine
    container_name: predict-postgres
    environment:
      POSTGRES_USER: predict
      POSTGRES_PASSWORD: predict
      POSTGRES_DB: predict
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predict -d predict"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
